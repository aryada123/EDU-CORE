<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - EduCore</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- Sidebar -->
<div class="side">

<h2 class="logo">EduCore</h2>

<div id="userInfo" style="margin-bottom:15px;font-size:14px;opacity:.8;"></div>

<button onclick="showPage('home')">Dashboard</button>
<button onclick="showPage('attendance')">Attendance</button>
<button onclick="showPage('marks')">Marks</button>
<button onclick="showPage('community')">Community</button>
<button onclick="showPage('complaints')">Complaints</button>
<button onclick="logout()">Logout</button>

</div>

<!-- Main -->
<div class="main">

<!-- HOME -->
<div class="page active" id="home">
<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Students</h3>
<p id="studentCount">0</p>
</div>

<div class="card">
<h3>Posts</h3>
<p id="postCount">0</p>
</div>

<div class="card">
<h3>Complaints</h3>
<p id="complaintCount">0</p>
</div>

</div>
</div>

<!-- ATTENDANCE -->
<div class="page" id="attendance">
<h1>Attendance</h1>

<input type="text" id="searchAttendance" placeholder="Search Student">

<input type="text" id="attName" placeholder="Student Name">
<input type="text" id="attValue" placeholder="Attendance %">

<button class="action" onclick="saveAttendance()">Save</button>

<div id="attendanceList"></div>
</div>

<!-- MARKS -->
<div class="page" id="marks">
<h1>Marks</h1>

<input type="text" id="searchMarks" placeholder="Search Student">

<select id="examType">
<option>PT1</option>
<option>PT2</option>
<option>PT3</option>
<option>Half-Yearly</option>
<option>Final</option>
</select>

<input type="text" id="markName" placeholder="Student Name">
<input type="text" id="markValue" placeholder="Marks">

<button class="action" onclick="saveMarks()">Save</button>

<div id="marksList"></div>
</div>

<!-- COMMUNITY -->
<div class="page" id="community">
<h1>Community</h1>

<textarea id="postText" placeholder="Write message"></textarea>
<button class="action" onclick="addPost()">Post</button>

<div id="postList"></div>
</div>

<!-- COMPLAINTS -->
<div class="page" id="complaints">
<h1>Complaints</h1>

<textarea id="complaintText" placeholder="Parents can write complaint"></textarea>
<button class="action" onclick="saveComplaint()">Submit</button>

<div id="complaintList"></div>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
