<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EduCore</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-page">

<div class="login-box">

<h1>EduCore Login</h1>
<p>Select role and enter details</p>

<select id="role">
<option value="student">Student</option>
<option value="parent">Parent</option>
<option value="teacher">Teacher</option>
<option value="admin">Admin</option>
</select>

<select id="class">
<option value="">Select Class</option>
<script>
for(let i=1;i<=12;i++){
document.write(`<option value="${i}">${i}</option>`);
}
</script>
</select>

<select id="section">
<option value="">Section</option>
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<input type="text" id="username" placeholder="Enter Username">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p style="margin-top:10px;font-size:14px;opacity:.7;">
Admin Password: admin123
</p>

</div>
</div>

<script>
function login(){

let role=document.getElementById("role").value;
let cls=document.getElementById("class").value;
let sec=document.getElementById("section").value;
let user=document.getElementById("username").value.trim();
let pass=document.getElementById("password").value.trim();

if(user===""){
alert("Enter username");
return;
}

if(role!=="admin" && (cls==="" || sec==="")){
alert("Select class and section");
return;
}

if(role==="admin"){
if(pass!=="admin123"){
alert("Wrong admin password");
return;
}
}else{
if(pass!=="1234"){
alert("Wrong password");
return;
}
}

localStorage.setItem("role",role);
localStorage.setItem("username",user);
localStorage.setItem("class",cls);
localStorage.setItem("section",sec);

window.location.href="dashboard.html";
}
</script>

</body>
</html>
